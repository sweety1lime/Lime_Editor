# Прод-вариант: app + postgres + Caddy (TLS через Let's Encrypt).
# Переменные читает из .env (см. .env.example).
# Пример старта: `docker compose -f compose.prod.yml up -d`

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
      POSTGRES_DB: ${POSTGRES_DB:-limeeditor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-limeeditor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:?APP_IMAGE не задан (пример: ghcr.io/sweety1lime/lime_editor:latest)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__connect: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-limeeditor};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      ASPNETCORE_ENVIRONMENT: Production
      # Host-header allow-list: только наш домен (Caddy сохраняет исходный Host при проксировании).
      # Переопределяет fail-closed дефолт "localhost" из appsettings.json.
      AllowedHosts: ${DOMAIN:?DOMAIN не задан (пример: lime.example.com)}
      # App is exposed only inside the Docker network; Caddy is the only public entry point.
      # For non-compose deployments prefer FORWARDED_HEADERS_KNOWN_PROXIES / _KNOWN_NETWORKS.
      ForwardedHeaders__TrustAll: ${FORWARDED_HEADERS_TRUST_ALL:-true}
      ForwardedHeaders__KnownProxies: ${FORWARDED_HEADERS_KNOWN_PROXIES:-}
      ForwardedHeaders__KnownNetworks: ${FORWARDED_HEADERS_KNOWN_NETWORKS:-}
      Identity__RequireConfirmedEmail: ${IDENTITY_REQUIRE_CONFIRMED_EMAIL:-false}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      STOCK_PEXELS_KEY: ${STOCK_PEXELS_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SSL: ${SMTP_SSL:-true}
      # Ключи DataProtection — на volume: ими зашифрованы GitHub-токены пользователей
      # (и подписаны cookie/antiforgery). Без персиста пересоздание контейнера делает
      # сохранённые токены нечитаемыми, а все сессии — недействительными.
      DataProtection__KeysPath: /app/keys
      # GitHub-деплой (Wave 1 п.4): без ClientId/Secret фича честно пишет «не настроено».
      GitHub__OAuthApp__ClientId: ${GITHUB_OAUTH_CLIENT_ID:-}
      GitHub__OAuthApp__ClientSecret: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      # Бета-режим: Free получает лимиты Pro (экспорт/GitHub-деплой/кастом-код/AI-квота).
      # Выключить при разморозке биллинга (M3). Платные подписки флаг не трогает.
      Entitlements__BetaUnlockPro: ${BETA_UNLOCK_PRO:-true}
    expose:
      - "8080"
    volumes:
      # Загруженные юзерами медиа — на хост-volume. В Phase 3 §3.2 плана переезд на S3.
      - media_data:/app/wwwroot/media
      - dataprotection_keys:/app/keys
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Бэкап-сайдкар: раз в BACKUP_INTERVAL делает pg_dump (-Fc) + архив медиа в volume backups_data,
  # с retention BACKUP_RETENTION_DAYS. Образ postgres:16 — версия pg_dump совпадает с сервером.
  # Восстановление — см. ops/backup/RESTORE.md. Off-site-синк volume настраивается на хосте.
  backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
      POSTGRES_DB: ${POSTGRES_DB:-limeeditor}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      MEDIA_SRC: /media
      BACKUP_DIR: /backups
    volumes:
      - ./ops/backup:/scripts:ro
      - media_data:/media:ro
      - backups_data:/backups
    entrypoint: ["/bin/sh", "/scripts/entrypoint.sh"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN не задан (пример: lime.example.com)}
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  media_data:
  backups_data:
  dataprotection_keys:
