name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Lime_Editor.sln

      - name: Build
        run: dotnet build Lime_Editor.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Lime_Editor.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx
          retention-days: 7

  editor-v2-e2e:
    name: editor v2 browser smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: limeeditor_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d limeeditor_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LIME_E2E_BASE_URL: http://127.0.0.1:5000
      ConnectionStrings__connect: Host=127.0.0.1;Port=5432;Database=limeeditor_e2e;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Editor V2 browser smoke
        run: npm run test:e2e:editor-v2

      - name: Upload browser traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: editor-v2-playwright-results
          path: ./test-results
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: docker build + push
    needs: build
    runs-on: ubuntu-latest
    # Образ пушим только из master, на PR — только проверочный билд (через context-less ниже).
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
