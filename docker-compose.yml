# Локальная разработка: одна команда `docker compose up --build` — поднимает app + postgres.
# Прод-вариант — см. compose.prod.yml (там добавлен Caddy для TLS).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: limeeditor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limeeditor"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__connect: "Host=postgres;Port=5432;Database=limeeditor;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    volumes:
      # Загруженные юзерами медиа лежат вне образа — иначе пересборка стирает их.
      - media_data:/app/wwwroot/media

volumes:
  postgres_data:
  media_data:
